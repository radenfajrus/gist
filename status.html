<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket Status Card - Awaiting Confirm</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f4;
    padding: 24px;
    margin: 0;
  }

  .card {
    max-width: 480px;
    background: #ffffff;
    border: 1px solid #e5e5e3;
    border-radius: 12px;
    padding: 16px 20px;
    color: #1a1a1a;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .user {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #faeeda;
    color: #854f0b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 13px;
  }

  .user-name {
    font-weight: 500;
    font-size: 14px;
    margin: 0;
  }

  .user-meta {
    font-size: 12px;
    color: #6b6b66;
    margin: 0;
  }

  .badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 8px;
    font-weight: 500;
    background: #faeeda;
    color: #854f0b;
  }

  .fields {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    font-size: 13px;
  }

  .field-label {
    color: #6b6b66;
    font-size: 12px;
    margin: 0 0 2px;
  }

  .field-value {
    margin: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .check {
    color: #3b6d11;
    font-weight: 500;
  }

  .footer {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid #ececea;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #6b6b66;
  }

  .btn {
    font-size: 12px;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid #d4d4d1;
    border-radius: 6px;
    cursor: pointer;
    color: #1a1a1a;
  }

  .btn:hover {
    background: #f5f5f4;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="user">
      <div class="avatar">SP</div>
      <div>
        <p class="user-name">Siti Pratiwi</p>
        <p class="user-meta">ctx_2d1c · Telegram · 5m ago</p>
      </div>
    </div>
    <span class="badge">Awaiting confirm</span>
  </div>

  <div class="fields">
    <div>
      <p class="field-label">Ticket type</p>
      <p class="field-value"><span class="check">✓</span> Software</p>
    </div>
    <div>
      <p class="field-label">Department</p>
      <p class="field-value"><span class="check">✓</span> Finance</p>
    </div>
    <div>
      <p class="field-label">Location</p>
      <p class="field-value"><span class="check">✓</span> Jakarta HQ</p>
    </div>
    <div>
      <p class="field-label">Content</p>
      <p class="field-value"><span class="check">✓</span> Provided</p>
    </div>
  </div>

  <div class="footer">
    <span>Turn 5 · Confirmation prompt sent</span>
    <button class="btn">View</button>
  </div>
</div>

</body>
</html>
